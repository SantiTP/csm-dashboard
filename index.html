  .dot.amber { background: var(--amber); }
  .dot.green { background: var(--green); }
  .dot.blue { background: var(--blue); }

<script>
(function() {
  var d = window.__DASHBOARD_DATA;
  if (!d) return;

  document.getElementById('timestamp').textContent = new Date(d.consolidatedAt).toLocaleString('en-AU', { dateStyle: 'medium', timeStyle: 'short', timeZone: 'Australia/Melbourne' });

  document.getElementById('stat-risk').textContent = d.stats.atRisk;
  document.getElementById('stat-open').textContent = d.stats.openItems;
  document.getElementById('stat-upsell').textContent = d.stats.upsell;
  document.getElementById('stat-meetings').textContent = d.stats.meetings;

  // Populate sidebar Asana tasks
  if (d.tasks['asana-tasks']) {
    document.getElementById('content-asana-sidebar').innerHTML = d.tasks['asana-tasks'].html;
    document.getElementById('lr-asana').textContent = 'Updated: ' + new Date(d.tasks['asana-tasks'].lastRun).toLocaleString('en-AU', { dateStyle: 'short', timeStyle: 'short', timeZone: 'Australia/Melbourne' });
  }

  // Populate section content
  var map = {
    'morning-briefing': { content: 'content-morning-briefing', lr: 'lr-morning' },
    'eod-wrap-up': { content: 'content-eod-wrap-up', lr: 'lr-eod' },
    'inbox-triage': { content: 'content-inbox-triage', lr: 'lr-inbox' },
    'monday-weekly-review': { content: 'content-monday-weekly-review', lr: 'lr-monday' },
    'friday-weekly-wrap-up': { content: 'content-friday-weekly-wrap-up', lr: 'lr-friday' }
  };
  for (var key in map) {
    if (d.tasks[key]) {
      document.getElementById(map[key].content).innerHTML = d.tasks[key].html;
      document.getElementById(map[key].lr).textContent = 'Updated: ' + new Date(d.tasks[key].lastRun).toLocaleString('en-AU', { dateStyle: 'short', timeStyle: 'short', timeZone: 'Australia/Melbourne' });
    }
  }

  // --- Collapsible sections ---
  document.querySelectorAll('.section h2').forEach(function(h2) {
    h2.addEventListener('click', function() {
      this.parentElement.classList.toggle('collapsed');
    });
  });

  // --- Time-based section ordering (AEST) ---
  var now = new Date(new Date().toLocaleString('en-US', { timeZone: 'Australia/Melbourne' }));
  var day = now.getDay(); // 0=Sun, 1=Mon, 5=Fri
  var hour = now.getHours() + now.getMinutes() / 60;
  var morning = 9.5;  // 9:30am
  var eod = 17.5;     // 5:30pm

  var order;
  if (day === 5 && hour >= eod) {
    // Friday after 5:30pm
    order = ['friday-weekly-wrap-up', 'eod-wrap-up', 'morning-briefing', 'inbox-triage', 'monday-weekly-review'];
  } else if (day >= 1 && day <= 5 && hour >= eod) {
    // Mon-Thu after 5:30pm
    order = ['eod-wrap-up', 'morning-briefing', 'inbox-triage', 'monday-weekly-review', 'friday-weekly-wrap-up'];
  } else if (day === 1 && hour >= morning && hour < eod) {
    // Monday 9:30am-5:30pm
    order = ['monday-weekly-review', 'morning-briefing', 'inbox-triage', 'eod-wrap-up', 'friday-weekly-wrap-up'];
  } else if (day >= 2 && day <= 5 && hour >= morning && hour < eod) {
    // Tue-Fri 9:30am-5:30pm
    order = ['morning-briefing', 'inbox-triage', 'eod-wrap-up', 'monday-weekly-review', 'friday-weekly-wrap-up'];
  } else {
    // Before 9:30am any weekday, or weekends — show EOD at top
    order = ['eod-wrap-up', 'morning-briefing', 'inbox-triage', 'monday-weekly-review', 'friday-weekly-wrap-up'];
  }

  // Reorder DOM
  var container = document.getElementById('sections-container');
  order.forEach(function(key, i) {
    var el = document.querySelector('[data-key="' + key + '"]');
    if (el) {
      // First section gets priority highlight and full-width
      el.classList.remove('full-width', 'priority');
      if (i === 0) { el.classList.add('full-width', 'priority'); }
      container.appendChild(el);
    }
  });
})();
</script>
