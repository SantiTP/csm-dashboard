<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --muted: #9ca3af;
    --accent: #6366f1;
    --red: #ef4444;
    --amber: #f59e0b;
    --green: #22c55e;
    --blue: #3b82f6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
  .header h1 { font-size: 1.5rem; font-weight: 700; }
  .header h1 span { color: var(--accent); }
  .timestamp { color: var(--muted); font-size: 0.8rem; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; }
  .stat-card .value { font-size: 2rem; font-weight: 800; }
  .stat-card .label { color: var(--muted); font-size: 0.8rem; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-card.risk .value { color: var(--red); }
  .stat-card.open .value { color: var(--amber); }
  .stat-card.upsell .value { color: var(--green); }
  .stat-card.meetings .value { color: var(--blue); }
  .sections { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 16px; }
  .section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .section h2 { font-size: 1rem; font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
  .section .meta { font-size: 0.7rem; color: var(--muted); margin-bottom: 12px; }
  .section ul { list-style: none; padding: 0; }
  .section li { padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; line-height: 1.5; display: flex; align-items: flex-start; gap: 8px; }
  .section li:last-child { border-bottom: none; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
  .dot.red { background: var(--red); }
  .dot.amber { background: var(--amber); }
  .dot.green { background: var(--green); }
  .dot.blue { background: var(--blue); }
  .dot.grey { background: var(--muted); }
  .badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: 600; }
  .badge.red { background: rgba(239,68,68,0.15); color: var(--red); }
  .badge.amber { background: rgba(245,158,11,0.15); color: var(--amber); }
  .badge.green { background: rgba(34,197,94,0.15); color: var(--green); }
  .footer { text-align: center; color: var(--muted); font-size: 0.7rem; margin-top: 24px; }
</style>
</head>

<div class="stats" id="stats-grid"></div>
<div class="sections" id="sections-grid"></div>
<div class="footer">CSM Command Centre &middot; Auto-updated by Claude &middot; Santi Perez &middot; Amplitude APJ</div>

<script>
(function() {
  const d = window.__DASHBOARD_DATA;
  if (!d) return;

  const ts = new Date(d.consolidatedAt);
  document.getElementById('ts').textContent = 'Last updated: ' + ts.toLocaleString('en-AU', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit', timeZone: 'Australia/Melbourne' });

  const statsGrid = document.getElementById('stats-grid');
  const statsDef = [
    { key: 'atRisk', label: 'At-Risk Accounts', cls: 'risk' },
    { key: 'openItems', label: 'Open Items', cls: 'open' },
    { key: 'upsell', label: 'Upsell Signals', cls: 'upsell' },
    { key: 'meetings', label: 'Meetings Today', cls: 'meetings' }
  ];
  statsDef.forEach(s => {
    const card = document.createElement('div');
    card.className = 'stat-card ' + s.cls;
    card.innerHTML = '<div class="value">' + d.stats[s.key] + '</div><div class="label">' + s.label + '</div>';
    statsGrid.appendChild(card);
  });

  const sectionsGrid = document.getElementById('sections-grid');
  const sectionsDef = [
    { key: 'morning-briefing', icon: '☀️', title: 'Morning Briefing' },
    { key: 'inbox-triage', icon: '📬', title: 'Inbox Triage' },
    { key: 'eod-wrap-up', icon: '🌙', title: 'EOD Wrap-Up' },
    { key: 'friday-weekly-wrap-up', icon: '🌟', title: 'Friday Weekly Wrap-Up' },
    { key: 'monday-weekly-review', icon: '📅', title: 'Monday Weekly Review' }
  ];
  sectionsDef.forEach(s => {
    const task = d.tasks[s.key];
    if (!task) return;
    const sec = document.createElement('div');
    sec.className = 'section';
    const runTs = new Date(task.lastRun);
    const meta = runTs.toLocaleString('en-AU', { weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit', timeZone: 'Australia/Melbourne' });
    sec.innerHTML = '<h2>' + s.icon + ' ' + s.title + '</h2><div class="meta">Last run: ' + meta + '</div>' + task.html;
    sectionsGrid.appendChild(sec);
  });
})();
</script>
