<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --muted: #9ca3af;
    --accent: #6366f1;
    --red: #ef4444;
    --amber: #f59e0b;
    --green: #22c55e;
    --blue: #3b82f6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 24px; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .header h1 { font-size: 22px; font-weight: 600; }
  .header .ts { color: var(--muted); font-size: 13px; }
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; }
  .stat-card .value { font-size: 36px; font-weight: 700; }
  .stat-card .label { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .stat-card.risk .value { color: var(--red); }
  .stat-card.open .value { color: var(--amber); }
  .stat-card.upsell .value { color: var(--green); }
  .stat-card.meetings .value { color: var(--blue); }
  .sections { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .section.full-width { grid-column: 1 / -1; }
  .section h2 { font-size: 15px; font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
  .section .last-run { font-size: 11px; color: var(--muted); margin-bottom: 14px; }
  .section ul { list-style: none; padding: 0; }
  .section li { padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; line-height: 1.5; display: flex; align-items: flex-start; gap: 8px; }
  .section li:last-child { border-bottom: none; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .dot.red { background: var(--red); }
  .dot.amber { background: var(--amber); }
  .dot.green { background: var(--green); }
  .dot.blue { background: var(--blue); }
  .dot.grey { background: #6b7280; }
  .badge { display: inline-block; padding: 1px 7px; border-radius: 6px; font-size: 11px; font-weight: 500; }
  .badge.critical { background: rgba(239,68,68,0.15); color: var(--red); }
  .badge.high { background: rgba(245,158,11,0.15); color: var(--amber); }
  .badge.upsell { background: rgba(34,197,94,0.15); color: var(--green); }
  .stale-note { color: var(--muted); font-style: italic; font-size: 12px; }
  @media (max-width: 768px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } .sections { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<script>
(function() {
  const d = window.__DASHBOARD_DATA;
  if (!d) return;

  // Timestamp
  const ts = new Date(d.consolidatedAt);
  document.getElementById('timestamp').textContent = 'Last consolidated: ' + ts.toLocaleString('en-AU', { timeZone: 'Australia/Melbourne', weekday: 'short', day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });

  // Stats
  const statsEl = document.getElementById('stats');
  const statsDef = [
    { key: 'atRisk', label: 'At-Risk Accounts', cls: 'risk' },
    { key: 'openItems', label: 'Open Items', cls: 'open' },
    { key: 'upsell', label: 'Upsell Signals', cls: 'upsell' },
    { key: 'meetings', label: 'Meetings Today', cls: 'meetings' }
  ];
  statsDef.forEach(function(s) {
    const card = document.createElement('div');
    card.className = 'stat-card ' + s.cls;
    card.innerHTML = '<div class="value">' + d.stats[s.key] + '</div><div class="label">' + s.label + '</div>';
    statsEl.appendChild(card);
  });

  // Sections
  const sectionsEl = document.getElementById('sections');
  const sectionDef = [
    { id: 'morning-briefing', title: 'Morning Briefing', icon: '\u2600\uFE0F' },
    { id: 'inbox-triage', title: 'Inbox Triage', icon: '\uD83D\uDCE8' },
    { id: 'eod-wrap-up', title: 'EOD Wrap-Up', icon: '\uD83C\uDF19' },
    { id: 'monday-weekly-review', title: 'Monday Weekly Review', icon: '\uD83D\uDCC5' },
    { id: 'friday-weekly-wrap-up', title: 'Friday Weekly Wrap-Up', icon: '\uD83C\uDFC1', fullWidth: true }
  ];
  sectionDef.forEach(function(sec) {
    var task = d.tasks[sec.id];
    if (!task) return;
    var div = document.createElement('div');
    div.className = 'section' + (sec.fullWidth ? ' full-width' : '');
    var lr = task.lastRun ? new Date(task.lastRun).toLocaleString('en-AU', { timeZone: 'Australia/Melbourne', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }) : 'Unknown';
    div.innerHTML = '<h2>' + sec.icon + ' ' + sec.title + '</h2><div class="last-run">Last run: ' + lr + '</div>' + task.html;
    sectionsEl.appendChild(div);
  });
})();
