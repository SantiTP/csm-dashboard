<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --muted: #9ca3af;
    --accent: #6366f1;
    --red: #ef4444;
    --amber: #f59e0b;
    --green: #22c55e;
    --blue: #3b82f6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 24px; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .header h1 { font-size: 1.5rem; font-weight: 600; }
  .header .subtitle { color: var(--muted); font-size: 0.85rem; }
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; }
  .stat-card .value { font-size: 2rem; font-weight: 700; }
  .stat-card .label { font-size: 0.8rem; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-card.red .value { color: var(--red); }
  .stat-card.amber .value { color: var(--amber); }
  .stat-card.green .value { color: var(--green); }
  .stat-card.blue .value { color: var(--blue); }
  .sections { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .section.full-width { grid-column: 1 / -1; }
  .section h2 { font-size: 1rem; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .section h2 .icon { font-size: 1.1rem; }
  .section .last-run { font-size: 0.7rem; color: var(--muted); font-weight: 400; margin-left: auto; }
  .section ul { list-style: none; padding: 0; }
  .section li { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; line-height: 1.5; display: flex; align-items: flex-start; gap: 8px; }
  .section li:last-child { border-bottom: none; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
  .dot.red { background: var(--red); }
  .dot.amber { background: var(--amber); }
  .dot.green { background: var(--green); }
  .dot.blue { background: var(--blue); }
  .dot.grey { background: #6b7280; }
  .tag { display: inline-block; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; font-weight: 500; margin-left: 4px; }
  .tag.critical { background: rgba(239,68,68,0.15); color: var(--red); }
  .tag.high { background: rgba(245,158,11,0.15); color: var(--amber); }
  .tag.upsell { background: rgba(34,197,94,0.15); color: var(--green); }
  .tag.overdue { background: rgba(239,68,68,0.15); color: var(--red); }
  .tag.info { background: rgba(99,102,241,0.15); color: var(--accent); }
  .note { font-size: 0.75rem; color: var(--muted); font-style: italic; padding: 8px 0; }
  @media (max-width: 768px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .sections { grid-template-columns: 1fr; }
  }
</style>
</head>

  }
})();
</script>
