<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card-border: #2a2d3a;
    --text: #e4e4e7;
    --text-muted: #9ca3af;
    --accent: #6366f1;
    --red: #ef4444;
    --amber: #f59e0b;
    --green: #22c55e;
    --blue: #3b82f6;
    --purple: #a855f7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .header { padding: 24px 32px 16px; border-bottom: 1px solid var(--card-border); display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 22px; font-weight: 600; }
  .header h1 span { color: var(--accent); }
  .header .meta { font-size: 13px; color: var(--text-muted); text-align: right; }
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; padding: 20px 32px; }
  .stat-card { background: var(--card); border: 1px solid var(--card-border); border-radius: 12px; padding: 18px 20px; }
  .stat-card .label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .stat-card .value { font-size: 32px; font-weight: 700; }
  .stat-card .value.red { color: var(--red); }
  .stat-card .value.amber { color: var(--amber); }
  .stat-card .value.green { color: var(--green); }
  .stat-card .value.blue { color: var(--blue); }
  .stat-card .value.purple { color: var(--purple); }
  .sections { padding: 8px 32px 32px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .section { background: var(--card); border: 1px solid var(--card-border); border-radius: 12px; padding: 20px 24px; }
  .section.full-width { grid-column: 1 / -1; }
  .section h2 { font-size: 15px; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .section h2 .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .section h2 .dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .section h2 .dot.stale { background: var(--text-muted); }
  .section ul { list-style: none; }
  .section li { padding: 6px 0; font-size: 14px; line-height: 1.5; border-bottom: 1px solid rgba(255,255,255,0.04); display: flex; align-items: flex-start; gap: 8px; }
  .section li:last-child { border-bottom: none; }
  .section li .icon { flex-shrink: 0; width: 18px; text-align: center; font-size: 13px; margin-top: 2px; }
  .section .stale-note { font-size: 12px; color: var(--text-muted); font-style: italic; margin-top: 8px; }
  .tag { display: inline-block; font-size: 11px; padding: 2px 7px; border-radius: 4px; font-weight: 600; margin-left: 4px; }
  .tag.critical { background: rgba(239,68,68,0.15); color: var(--red); }
  .tag.high { background: rgba(245,158,11,0.15); color: var(--amber); }
  .tag.medium { background: rgba(59,130,246,0.15); color: var(--blue); }
  .tag.low { background: rgba(34,197,94,0.15); color: var(--green); }
  .tag.overdue { background: rgba(239,68,68,0.15); color: var(--red); }
  .tag.upsell { background: rgba(168,85,247,0.15); color: var(--purple); }
  .tag.renewal { background: rgba(245,158,11,0.2); color: var(--amber); }
  @media (max-width: 800px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .sections { grid-template-columns: 1fr; }
    .section.full-width { grid-column: 1; }
  }
</style>
</head>

<div class="stats-row" id="stats-row"></div>
<div class="sections" id="sections"></div>

<script>
(function() {
  const data = window.__DASHBOARD_DATA;
  if (!data) return;

  // Timestamp
  const ts = new Date(data.consolidatedAt);
  document.getElementById('timestamp').textContent = 'Updated: ' + ts.toLocaleString('en-AU', { timeZone: 'Australia/Melbourne', dateStyle: 'medium', timeStyle: 'short' });

  // Stats
  const statsEl = document.getElementById('stats-row');
  const stats = [
    { label: 'At-Risk Accounts', value: data.stats.atRisk, color: 'red' },
    { label: 'Open Items', value: data.stats.openItems, color: 'amber' },
    { label: 'Upsell Signals', value: data.stats.upsell, color: 'purple' },
    { label: 'Meetings Today', value: data.stats.meetings, color: 'blue' }
  ];
  stats.forEach(s => {
    const card = document.createElement('div');
    card.className = 'stat-card';
    card.innerHTML = '<div class="label">' + s.label + '</div><div class="value ' + s.color + '">' + s.value + '</div>';
    statsEl.appendChild(card);
  });

  // Sections
  const sectionMeta = {
    'morning-briefing': { title: 'Morning Briefing', live: true },
    'inbox-triage': { title: 'Inbox Triage', live: true },
    'eod-wrap-up': { title: 'End-of-Day Wrap-Up', live: true },
    'monday-weekly-review': { title: 'Weekly Review (Monday)', live: false },
    'friday-weekly-wrap-up': { title: 'Weekly Wrap-Up (Friday)', live: false }
  };

  const order = ['morning-briefing', 'inbox-triage', 'eod-wrap-up', 'monday-weekly-review', 'friday-weekly-wrap-up'];
  const sectionsEl = document.getElementById('sections');

  order.forEach((key, i) => {
    const task = data.tasks[key];
    const meta = sectionMeta[key];
    const sec = document.createElement('div');
    sec.className = 'section' + (i >= 3 ? '' : '');
    const dotClass = meta.live ? 'live' : 'stale';
    const lastRun = task.lastRun ? new Date(task.lastRun).toLocaleString('en-AU', { timeZone: 'Australia/Melbourne', dateStyle: 'short', timeStyle: 'short' }) : 'N/A';
    sec.innerHTML = '<h2><span class="dot ' + dotClass + '"></span>' + meta.title + '</h2>' + task.html + '<div class="stale-note">Last run: ' + lastRun + '</div>';
    sectionsEl.appendChild(sec);
  });
})();
</script>
